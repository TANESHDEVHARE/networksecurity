name: workflow

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README,md'

jobs:
  integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Lint code
      run: echo "Linting repository"

    - name: Run unit tests
      run: echo "Running unit tests"

  build-and-push-ecr-image:
    name: Continuous Delivery
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with: 
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Debug env
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          echo "Registry: $ECR_REGISTRY"
          echo "Repo: $ECR_REPOSITORY"
          echo "Tag: $IMAGE_TAG"

      - name: Build, tag, and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: latest
        run: |
          # Clean variables (IMPORTANT)
          ECR_REGISTRY=$(echo $ECR_REGISTRY | tr -d '\n')
          ECR_REPOSITORY=$(echo $ECR_REPOSITORY | tr -d '\n')
          IMAGE_TAG=$(echo $IMAGE_TAG | tr -d '\n')

          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Building: $IMAGE_URI"

          docker buildx build --platform linux/amd64 -t $IMAGE_URI . --load
          docker push $IMAGE_URI

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT
        